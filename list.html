<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yay or Ney • Your Wines</title>
    <!-- Google Fonts: playful heading and modern body -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1><a href="index.html">🍷 Yay or Ney</a></h1>
      <nav>
        <ul>
          <li><a href="index.html">Add Wine</a></li>
          <li><a href="list.html">View Wines</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="list-section">
        <h2>Your Wines</h2>

        <!-- Filters: allow users to narrow down their saved wines by rating, colour, varietal and price range -->
        <div class="filter-section">
          <h3>Filter Wines</h3>
          <div class="filter-grid">
            <div class="filter-group">
              <label for="filterRating">Rating</label>
              <select id="filterRating">
                <option value="">All</option>
                <option value="Yay">Yay</option>
                <option value="Ney">Ney</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filterColor">Colour</label>
              <select id="filterColor">
                <option value="">All</option>
                <option value="Red">Red</option>
                <option value="White">White</option>
                <option value="Rosé">Rosé</option>
                <option value="Sparkling">Sparkling</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filterVarietal">Varietal</label>
              <input type="text" id="filterVarietal" placeholder="e.g. Shiraz" />
            </div>
            <div class="filter-group">
              <label for="filterMinPrice">Min Price (AU$)</label>
              <input type="number" id="filterMinPrice" min="0" step="0.01" />
            </div>
            <div class="filter-group">
              <label for="filterMaxPrice">Max Price (AU$)</label>
              <input type="number" id="filterMaxPrice" min="0" step="0.01" />
            </div>
          </div>
          <button type="button" id="clearFilters" class="clear-btn">Clear Filters</button>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
          No wines saved yet. Head back to the add wine page and start logging
          your favourites!
        </div>
        <div id="wineList" class="wine-grid"></div>
      </section>
    </main>
    <footer>
      <p>
        Made with ❤️ for wine lovers. Keep track of your favourites and avoid
        the bad ones!
      </p>
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>
