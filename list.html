<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8B1A4A" />
    <title>Yay or Ney • My Wines</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1><a href="index.html">🍷 Yay or Ney</a></h1>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Add Wine</a>
        <a href="list.html" class="nav-link active-link">My Wines</a>
      </nav>
    </header>

    <main>
      <section class="list-section">
        <h2>My Wines</h2>

        <!-- Stats bar -->
        <div class="stats-bar" id="statsBar">
          <div class="stat-chip total-chip">
            <span class="stat-num" id="totalCount">0</span>
            <span class="stat-lbl">wines</span>
          </div>
          <div class="stat-chip yay-chip">
            <span class="stat-num" id="yayCount">0</span>
            <span class="stat-lbl">Yays 👍</span>
          </div>
          <div class="stat-chip ney-chip">
            <span class="stat-num" id="neyCount">0</span>
            <span class="stat-lbl">Neys 👎</span>
          </div>
        </div>

        <!-- Filter toggle button -->
        <button class="filter-toggle-btn" id="filterToggle" type="button">
          <span>Filter &amp; Sort</span>
          <span class="toggle-chevron">▾</span>
        </button>

        <!-- Collapsible filter + sort section -->
        <div class="filter-section" id="filterSection">
          <div class="filter-grid">
            <div class="filter-group">
              <label for="filterRating">Rating</label>
              <select id="filterRating">
                <option value="">All</option>
                <option value="Yay">Yay</option>
                <option value="Ney">Ney</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filterColor">Colour</label>
              <select id="filterColor">
                <option value="">All</option>
                <option value="Red">Red</option>
                <option value="White">White</option>
                <option value="Rosé">Rosé</option>
                <option value="Sparkling">Sparkling</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filterVarietal">Varietal</label>
              <input type="text" id="filterVarietal" placeholder="e.g. Shiraz" />
            </div>
            <div class="filter-group">
              <label for="filterMinPrice">Min Price (AU$)</label>
              <input type="number" id="filterMinPrice" min="0" step="0.01" placeholder="0" />
            </div>
            <div class="filter-group">
              <label for="filterMaxPrice">Max Price (AU$)</label>
              <input type="number" id="filterMaxPrice" min="0" step="0.01" placeholder="Any" />
            </div>
            <div class="filter-group">
              <label for="sortBy">Sort by</label>
              <select id="sortBy">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="price-asc">Price ↑</option>
                <option value="price-desc">Price ↓</option>
                <option value="yay-first">Yays first</option>
                <option value="ney-first">Neys first</option>
              </select>
            </div>
          </div>
          <button type="button" id="clearFilters" class="clear-btn">Clear Filters</button>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="empty-state" style="display: none;">
          <span class="empty-icon">🍾</span>
          <p class="empty-heading">No wines logged yet!</p>
          <p class="empty-sub">
            Head to <a href="index.html">Add Wine</a> and start your collection.
          </p>
        </div>

        <!-- Wine grid -->
        <div id="wineList" class="wine-grid"></div>
      </section>
    </main>

    <footer>
      <p>Made with ❤️ for wine lovers.</p>
    </footer>

    <!-- Edit modal (bottom sheet) -->
    <div id="editModal" class="modal-overlay" aria-modal="true" role="dialog" style="display:none;">
      <div class="modal-box">
        <div class="modal-header">
          <h3 class="modal-title">Edit Wine</h3>
          <button class="modal-close-btn" id="modalClose" aria-label="Close">✕</button>
        </div>
        <form id="editForm" class="wine-form">
          <input type="hidden" id="editId" />

          <div class="form-group">
            <label>Wine Label Photo <span class="optional">(tap to replace)</span></label>
            <div class="file-drop-zone" id="editFileDropZone">
              <div class="file-placeholder">
                <span class="drop-icon">📷</span>
                <span class="drop-text">Tap to replace photo</span>
                <span class="drop-hint">JPG · PNG · HEIC</span>
              </div>
              <div class="file-preview-wrap" id="editFilePreviewWrap">
                <img id="editPreviewImg" src="" alt="Label preview" />
                <div class="change-photo-overlay">Tap to change photo</div>
              </div>
              <input type="file" id="editImage" name="editImage" accept="image/*" />
            </div>
          </div>

          <div class="form-group">
            <label for="editWineName">Wine Name / Winery</label>
            <input type="text" id="editWineName" placeholder="e.g. Penfolds Bin 389" required />
          </div>

          <div class="form-group">
            <label>Your Verdict</label>
            <div class="rating-toggle">
              <label class="rating-option">
                <input type="radio" id="editRatingYay" name="editLabel" value="Yay" required />
                <span class="rating-pill yay-pill">👍 Yay</span>
              </label>
              <label class="rating-option">
                <input type="radio" id="editRatingNey" name="editLabel" value="Ney" />
                <span class="rating-pill ney-pill">👎 Ney</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="editColor">Colour</label>
            <select id="editColor" required>
              <option value="" disabled>Choose colour…</option>
              <option value="Red">🔴 Red</option>
              <option value="White">⚪ White</option>
              <option value="Rosé">🌸 Rosé</option>
              <option value="Sparkling">✨ Sparkling</option>
              <option value="Other">🍷 Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editVarietal">Varietal</label>
            <input type="text" id="editVarietal" placeholder="e.g. Shiraz, Chardonnay" required />
          </div>

          <div class="form-group">
            <label for="editPrice">Price <span class="optional">(AU$, optional)</span></label>
            <input type="number" id="editPrice" min="0" step="0.01" placeholder="e.g. 25.00" />
          </div>

          <div class="form-group">
            <label for="editNotes">Quick Notes <span class="optional">(optional)</span></label>
            <textarea id="editNotes" rows="2" placeholder="e.g. Smooth finish, great with steak…"></textarea>
          </div>

          <button type="submit" class="submit-btn">Save Changes ✓</button>
        </form>
      </div>
    </div>

    <!-- Mobile bottom navigation -->
    <nav class="bottom-nav" aria-label="App navigation">
      <a href="index.html" class="bottom-nav-item" data-page="index.html">
        <span class="bnav-icon">➕</span>
        <span class="bnav-label">Add Wine</span>
      </a>
      <a href="list.html" class="bottom-nav-item" data-page="list.html">
        <span class="bnav-icon">🍷</span>
        <span class="bnav-label">My Wines</span>
      </a>
    </nav>

    <script src="js/script.js"></script>
  </body>
</html>
