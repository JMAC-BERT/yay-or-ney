<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yay or Ney • Wine Tasting Log</title>
    <!-- Google Fonts: playful heading and modern body -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1><a href="index.html">🍷 Yay or Ney</a></h1>
      <nav>
        <ul>
          <li><a href="index.html">Add Wine</a></li>
          <li><a href="list.html">View Wines</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="form-section">
        <h2>Add a New Wine</h2>
        <form id="wineForm" class="wine-form">
          <div class="form-group">
            <label for="image">Wine Label Photo</label>
            <input
              type="file"
              id="image"
              name="image"
              accept="image/*"
              required
            />
          </div>
          <div class="form-group radio-group">
            <span class="label">Rating</span>
            <label>
              <input
                type="radio"
                name="label"
                value="Yay"
                required
              />
              <span class="radio-label yay">Yay</span>
            </label>
            <label>
              <input type="radio" name="label" value="Ney" />
              <span class="radio-label ney">Ney</span>
            </label>
          </div>
          <div class="form-group">
            <label for="color">Colour</label>
            <select id="color" name="color" required>
              <option value="" disabled selected>Choose colour</option>
              <option value="Red">Red</option>
              <option value="White">White</option>
              <option value="Rosé">Rosé</option>
              <option value="Sparkling">Sparkling</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="varietal">Varietal</label>
            <input
              type="text"
              id="varietal"
              name="varietal"
              placeholder="e.g. Shiraz, Chardonnay"
              required
            />
          </div>
          <div class="form-group">
            <label for="price">Price (AU$)</label>
            <input
              type="number"
              id="price"
              name="price"
              min="0"
              step="0.01"
              placeholder="e.g. 25.00"
            />
          </div>
          <button type="submit" class="submit-btn">Save Wine</button>
        </form>
      </section>
    </main>
    <footer>
      <p>
        Made with ❤️ for wine lovers. Keep track of your favourites and avoid
        the bad ones!
      </p>
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>
